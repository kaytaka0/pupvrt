<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet & Vine</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="logo">Velvet & Vine</div>
    </header>

    <main>
        <section class="intro">
            <h2>Elegance Redefined</h2>
            <p>Experience the finest fabrics.</p>
        </section>

        <section class="collection">
            <!-- BUG: Visual - Inconsistent Font (Times New Roman vs Sans) -->
            <h2 style="font-family: 'Times New Roman', serif;">Autumn Collection</h2>
            <div class="item">
                <div class="rect"></div>
                <h3>Cashmere Scarf</h3>
            </div>
            <div class="item">
                <div class="rect"></div>
                <h3>Leather Gloves</h3>
            </div>
            <div class="item">
                <div class="rect"></div>
                <h3>Wool Coat</h3>
            </div>
            <div class="item">
                <div class="rect"></div>
                <h3>Silk Tie</h3>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
